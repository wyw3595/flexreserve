spring.application.name=flexreserve-single

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/flexreserve?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

# ===============================
# MyBatis Configuration
# ===============================
# Enable camelCase mapping (database field user_name automatically maps to Java property userName)
mybatis.configuration.map-underscore-to-camel-case=true
# Print SQL statements executed by MyBatis (recommended during development)
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# Specify location of MyBatis XML mapper files
mybatis.mapper-locations=classpath:mapper/*.xml
